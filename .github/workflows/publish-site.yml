name: Publish Firmware Finder

# Regenerates index.json + the Finder site (Phase 1) and rebuilds every
# plugin feed (Phase 2) from whatever releases already exist. No firmware
# builds happen here -- that's Phase 3 (build-release.yml). Runs whenever a
# release is published, whenever devices/ metadata changes (a board's
# floors/EOL/aliases can change without a new firmware release), or on
# demand.
on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "devices/**"
      - "scripts/**"
      - "site/**"
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Gather release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sh scripts/gather-github-assets.sh "${{ github.repository }}" > assets.json
          echo "asset records: $(jq 'length' assets.json)"

      - name: Build index.json
        run: |
          sh scripts/make-index.sh assets.json devices > site/index.json
          echo "devices indexed: $(jq '.entries | length' site/index.json)"

      - name: Warn on boards missing devices/ metadata
        run: |
          unknown=$(jq -r '.unknown_boards[]' site/index.json)
          if [ -n "$unknown" ]; then
            echo "$unknown" | while IFS= read -r board; do
              echo "::warning::published images exist for board '$board' but devices/$board.json is missing -- it will show in the Finder with no display name, floors, or EOL data"
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-index
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# NOTE: the plugin-feed index job that used to live here (build-feed) was
# removed. Plugin feeds are now generated AND usign-signed by
# scripts/publish-plugin-feeds.sh, invoked from build-release.yml on the
# self-hosted runner (the only place the OTA key lives). Having a second,
# unsigned generator here re-uploaded Packages after the signed one and
# orphaned the Packages.sig -- routers then rejected the feed. One writer
# only: the signed one.
