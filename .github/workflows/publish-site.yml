name: Publish Firmware Finder

# Regenerates index.json + the Finder site (Phase 1) and rebuilds every
# plugin feed (Phase 2) from whatever releases already exist. No firmware
# builds happen here -- that's Phase 3 (build-release.yml). Runs whenever a
# release is published, whenever devices/ metadata changes (a board's
# floors/EOL/aliases can change without a new firmware release), or on
# demand.
on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - "devices/**"
      - "scripts/**"
      - "site/**"
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Gather release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sh scripts/gather-github-assets.sh "${{ github.repository }}" > assets.json
          echo "asset records: $(jq 'length' assets.json)"

      - name: Build index.json
        run: |
          sh scripts/make-index.sh assets.json devices > site/index.json
          echo "devices indexed: $(jq '.entries | length' site/index.json)"

      - name: Warn on boards missing devices/ metadata
        run: |
          unknown=$(jq -r '.unknown_boards[]' site/index.json)
          if [ -n "$unknown" ]; then
            echo "$unknown" | while IFS= read -r board; do
              echo "::warning::published images exist for board '$board' but devices/$board.json is missing -- it will show in the Finder with no display name, floors, or EOL data"
            done
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build-index
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-feed:
    runs-on: ubuntu-latest
    # Needs write access to upload Packages/Packages.gz back into the same
    # release the .ipks came from -- verified against opkg's own source
    # (libopkg/opkg_download.c) that the index and the packages it lists
    # MUST share one base URL, so there's no Pages-hosted-index option here
    # the way there is for the Finder's index.json.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Gather release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sh scripts/gather-github-assets.sh "${{ github.repository }}" > assets.json

      - name: Build plugin feeds
        run: sh scripts/make-feed.sh assets.json /tmp/feed-dl feed-out

      - name: Upload each feed back into its own release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tagdir in feed-out/*/; do
            tag=$(basename "$tagdir")
            [ -f "$tagdir/Packages.gz" ] || continue
            echo "uploading feed for $tag"
            gh release upload "$tag" "$tagdir/Packages" "$tagdir/Packages.gz" \
              --repo "${{ github.repository }}" --clobber
          done
