name: Build and publish a firmware release

# Phase 3: builds real Gargoyle firmware for one or more targets, signs each
# sysupgrade image with a detached usign .sig, and publishes everything as a
# GitHub Release. Publishing then cascades automatically into
# publish-site.yml and sign-manifests.yml (both trigger on
# `release: published`) -- this workflow only worries about build + sign +
# upload.
#
# THREE JOBS, not one -- learned the hard way: GitHub enforces a HARD
# 6-hour execution limit per JOB, self-hosted runners included ("The job
# has exceeded the maximum execution time of 6h0m0s" -- a real 4-target run
# died mid-upload at exactly 6h00m). One target's full build takes 1-2.5h,
# so per-target matrix jobs stay far under the limit, and the sign+upload
# job gets its own fresh 6 hours. The single self-hosted runner serializes
# the matrix jobs anyway; wall time is unchanged, only the per-job ceiling
# matters.
#
# The plan job also pins the requested ref to one COMMIT SHA up front, so
# serialized matrix jobs hours apart cannot end up building different
# commits if the branch moves mid-run.
#
# Runs on a SELF-HOSTED runner only, deliberately: heavy target builds need
# real CPU/disk/time budgets hosted runners don't offer for free, and --
# more importantly -- the usign PRIVATE KEY never leaves the build host
# (RFC #62's stated policy). It is read from a local file path on the
# runner ($GARGOYLE_OTA_KEY_DIR/ota.sec), never from a GitHub secret, so a
# compromised Actions secret store cannot leak it. Generate that key once
# with scripts/generate-ota-key.sh -- this workflow fails loudly if it is
# missing rather than silently skipping signing.
#
# usign does NOT exist on a bare runner host -- verified live, it only
# exists inside the gargoyle-builder container's own build output
# (<target>-src/staging_dir/host/bin/), so signing runs INSIDE the
# container via docker exec (key copied in for that step, deleted after).
#
# Every ${{ inputs.* }} / ${{ matrix.* }} value is passed through `env:`
# and read as a shell variable, never interpolated directly into a run:
# script body -- avoids the classic GitHub Actions script-injection
# pattern even though these inputs are workflow_dispatch-only.
on:
  workflow_dispatch:
    inputs:
      gargoyle_ref:
        description: "git ref (branch/tag) of ispyisail/gargoyle to build (its default branch is master, not main -- verified via the GitHub API, not assumed)"
        required: true
        default: "master"
      release_tag:
        description: "gargoyle-firmware release tag to publish under (e.g. v1.16.0)"
        required: true
      channel:
        description: "stable or testing (only affects the release's own title/notes/prerelease flag; gather-github-assets.sh infers channel from -rc/-beta/-alpha/-testing suffixes on the tag itself)"
        required: true
        default: "stable"
        type: choice
        options: [stable, testing]
      targets:
        description: "space-separated make targets to build (e.g. \"mediatek ath79 x86\")"
        required: true
        default: "x86"
      skip_build:
        description: "sign and publish whatever the container's build trees already hold, without rebuilding -- recovery path for a run that built fine but died in a later step"
        required: false
        default: false
        type: boolean

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      GARGOYLE_REF: ${{ inputs.gargoyle_ref }}
      TARGETS: ${{ inputs.targets }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      targets_json: ${{ steps.plan.outputs.targets_json }}
      gargoyle_sha: ${{ steps.plan.outputs.gargoyle_sha }}
    steps:
      - name: Resolve the target matrix and pin the gargoyle commit
        id: plan
        run: |
          set -e
          targets_json=$(printf '%s\n' "$TARGETS" | jq -R -c 'split(" ") | map(select(length > 0))')
          [ "$targets_json" != "[]" ] || { echo "::error::targets input is empty" >&2; exit 1; }
          sha=$(gh api "repos/ispyisail/gargoyle/commits/$GARGOYLE_REF" --jq .sha)
          echo "targets_json=$targets_json" >> "$GITHUB_OUTPUT"
          echo "gargoyle_sha=$sha" >> "$GITHUB_OUTPUT"
          echo "building $targets_json from ispyisail/gargoyle@$sha"

  build:
    needs: plan
    if: ${{ !inputs.skip_build }}
    runs-on: [self-hosted, gargoyle-builder]
    strategy:
      matrix:
        target: ${{ fromJSON(needs.plan.outputs.targets_json) }}
      # One runner serializes these anyway; fail-fast stops queued targets
      # after a real build failure instead of burning hours on a release
      # that will not publish.
      fail-fast: true
    env:
      TARGET: ${{ matrix.target }}
      GARGOYLE_SHA: ${{ needs.plan.outputs.gargoyle_sha }}
    steps:
      - name: Check out the pinned gargoyle commit inside the build container
        run: |
          set -e
          cd "${GARGOYLE_DOCKER_DIR:?GARGOYLE_DOCKER_DIR not set on this runner}"
          # gargoyle-build.sh's own `shell` subcommand is interactive-only
          # (no -c, no argument passthrough -- verified by reading it), so
          # this reaches the container the same way its make/sync
          # subcommands do internally. Fetches by URL, never a named
          # remote: this container's pre-existing "origin" still points at
          # the old pre-migration fork. Idempotent across the serialized
          # matrix jobs -- every target checks out the SAME pinned SHA.
          docker compose exec -u builder gargoyle-build sh -c \
            'cd /build/gargoyle && git fetch https://github.com/ispyisail/gargoyle.git "$1" && git checkout FETCH_HEAD' \
            _ "$GARGOYLE_SHA"

      - name: Build the target
        run: |
          set -e
          cd "${GARGOYLE_DOCKER_DIR:?GARGOYLE_DOCKER_DIR not set on this runner}"
          ./gargoyle-build.sh make "$TARGET" FULL_BUILD=true

  sign-publish:
    needs: [plan, build]
    # skip_build runs leave the build job skipped; anything else requires
    # every matrix leg green. !cancelled() keeps this from running after a
    # mid-run cancel.
    if: ${{ !cancelled() && (needs.build.result == 'success' || (inputs.skip_build && needs.build.result == 'skipped')) }}
    runs-on: [self-hosted, gargoyle-builder]
    permissions:
      contents: write
    env:
      GARGOYLE_REF: ${{ inputs.gargoyle_ref }}
      GARGOYLE_SHA: ${{ needs.plan.outputs.gargoyle_sha }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      CHANNEL: ${{ inputs.channel }}
      TARGETS: ${{ inputs.targets }}
    steps:
      - uses: actions/checkout@v5

      - name: Verify the signing key exists on this runner
        run: |
          key_dir="${GARGOYLE_OTA_KEY_DIR:?GARGOYLE_OTA_KEY_DIR not set on this runner}"
          if [ ! -f "$key_dir/ota.sec" ]; then
            echo "::error::$key_dir/ota.sec not found. Run scripts/generate-ota-key.sh once on this runner before using this workflow -- refusing to publish unsigned images." >&2
            exit 1
          fi
          echo "signing key present at $key_dir/ota.sec"

      - name: Sign every built image inside the container, then collect it
        run: |
          set -e
          key_dir="$GARGOYLE_OTA_KEY_DIR"
          out="release-assets"
          rm -rf "$out"
          mkdir -p "$out"

          # Key goes into the container only for this step's duration, into a
          # path outside anything the build ever packages or publishes.
          work=/tmp/ota-key
          docker exec gargoyle-builder mkdir -p "$work"
          docker cp "$key_dir/ota.sec" "gargoyle-builder:$work/ota.sec"
          cleanup_key() { docker exec gargoyle-builder rm -rf "$work"; }
          trap cleanup_key EXIT

          for target in $TARGETS; do
            src_dir="/build/gargoyle/${target}-src"
            docker exec gargoyle-builder sh -c "[ -d '$src_dir' ]" || { echo "::warning::no ${target}-src found, skipping"; continue; }

            # Three image families are published; sysupgrade images get a
            # DETACHED .sig sidecar (usign over the exact published bytes),
            # factory and combined images ship with sha256 sidecars only:
            #   sysupgrade  -> .sig sidecar: the only artifact the OTA
            #                  client downloads (RFC #62). Detached, NOT
            #                  appended -- the build itself already appends
            #                  a ucert signature block (BUILD_KEY, see
            #                  include/image-commands.mk), so appending a
            #                  second trailer would bury the native one and
            #                  break stock sysupgrade signature checking
            #                  the day it is enforced (fwtool_check_signature
            #                  pops the LAST trailer and expects a ucert).
            #                  Detached also keeps every published byte
            #                  identical to what the build produced.
            #   factory     -> vendor container formats; never OTA'd.
            #   combined    -> x86-style .img.gz; x86 names its sysupgrade-
            #                  equivalent image "combined", which is why an
            #                  earlier pattern collected NOTHING for x86.
            # Integrity for unsigned families comes from the sha256
            # sidecars + the signed OTA manifest (which lists sha256s).
            images=$(docker exec gargoyle-builder sh -c \
              "find $src_dir/bin/targets -type f \\( -name '*-squashfs-sysupgrade.*' -o -name '*-squashfs-factory*' -o -name '*-squashfs-combined*' \\)")

            [ -n "$images" ] || echo "::warning::no publishable images found under ${target}-src/bin/targets -- naming convention drift?"

            printf '%s\n' "$images" | while IFS= read -r img; do
              [ -n "$img" ] || continue
              base=$(basename "$img")

              docker cp "gargoyle-builder:$img" "$out/$base"

              case "$base" in
              *-squashfs-sysupgrade.*)
                # usign lives at $src_dir/staging_dir/host/bin for whichever
                # target was just built (NOT on the bare runner host). The
                # detached signature is written straight into $work, never
                # into the build tree -- the tree stays byte-pristine.
                docker exec gargoyle-builder sh -c "
                  set -e
                  '$src_dir/staging_dir/host/bin/usign' -S -m '$img' -s '$work/ota.sec' -x '$work/img.sig'
                "
                docker cp "gargoyle-builder:$work/img.sig" "$out/$base.sig"
                docker exec gargoyle-builder rm -f "$work/img.sig"
                ;;
              esac

              # sha256 sidecar for the Finder/manifest's cheap hash lookup
              # (gather-github-assets.sh reads this instead of downloading
              # the full image just to hash it).
              sha256sum "$out/$base" | awk '{print $1}' > "$out/$base.sha256"
            done
          done

          cleanup_key
          trap - EXIT

          # A build that produced nothing publishable must fail HERE, not
          # "succeed" and then die at the upload step's empty glob -- that
          # silent-empty path is exactly how the first x86 validation run
          # failed.
          if [ -z "$(ls -A "$out")" ]; then
            echo "::error::zero assets collected across all targets ($TARGETS) -- refusing to publish an empty release" >&2
            exit 1
          fi

          echo "collected assets:"
          ls -la "$out" | head -20
          echo "total: $(ls "$out" | wc -l) files"

      - name: Create or update the release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          extra_flag=""
          [ "$CHANNEL" = "testing" ] && extra_flag="--prerelease"
          # Draft-first, publish-last: `gh release create` without --draft
          # fires the `release: published` event IMMEDIATELY, before any
          # asset upload -- publish-site.yml and sign-manifests.yml would
          # index an empty release and nothing re-triggers them once the
          # uploads land. Creating as a draft, uploading, and only then
          # flipping draft off makes the published event fire with every
          # asset already in place. (Proved its worth on the first
          # 4-target run: it died at the 6h job limit mid-upload, and the
          # draft meant nothing downstream ever saw the partial release.)
          gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --repo "${{ github.repository }}" \
              --title "$RELEASE_TAG" \
              --notes "Gargoyle firmware built from ispyisail/gargoyle@${GARGOYLE_SHA} (ref: ${GARGOYLE_REF}, channel: ${CHANNEL})" \
              --draft $extra_flag
          gh release upload "$RELEASE_TAG" release-assets/* --repo "${{ github.repository }}" --clobber
          # No-op if the release is already published (re-runs, added targets).
          gh release edit "$RELEASE_TAG" --repo "${{ github.repository }}" --draft=false
